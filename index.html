<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Task Using Promise</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3">

            <div class="card">
                <div class="card-body">
                    <form id="blogForm">

                        <div class="form-group">
                            <label>Title</label>
                            <input type="text"
                                   id="title"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Content</label>
                            <textarea id="content"
                                      rows="4"
                                      class="form-control"
                                      required></textarea>
                        </div>

                        <button type="submit"
                                class="btn btn-primary btn-block">
                            Add Blog
                        </button>

                    </form>
                </div>
            </div>

            <div id="blogContainer" class="mt-4"></div>

        </div>
    </div>
</div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Custom JS -->
<script src="app.js"></script>

</body>
</html>
